<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FactoryIQ - Industrial Intelligence</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages / Static Hosting SPA fallback
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + (l.pathname.split('/')[1] ? '/' + l.pathname.split('/')[1] : '') + '/?p=' +
        l.pathname.slice(1).replace(/&/g, '~and~') + (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif;">
      <p>Redirecting to FactoryIQ dashboard...</p>
    </div>
  </body>
</html>
